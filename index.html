    <style>
      :root {
        --snapbg: #ECE04F;
        --snapbg2: #E6D944;
        --cream: #F4EEC9;
        --cream-dark: #E7DC9C;
        --ink: #161616;
        --brown: #8C7B33;
        --blue: #4FC3F7;
        --blue-dark: #36B4EF;
      }

      html, body { background-color: var(--snapbg); }
      body {
        font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--ink);
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* Custom scrollbar hiding for clean UI */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* ---- SnapNoid flat surfaces ---- */
      .snap-card {
        background: var(--cream);
        box-shadow: 0 10px 22px -10px rgba(70, 60, 0, 0.45);
      }
      .snap-input {
        background: var(--cream-dark);
        border: 1.5px solid rgba(0, 0, 0, 0.14);
        color: var(--ink);
      }
      .snap-input::placeholder { color: rgba(0, 0, 0, 0.4); }
      .snap-input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(79, 195, 247, 0.25);
      }
      .snap-btn {
        background: linear-gradient(180deg, #5BC6F3 0%, var(--blue-dark) 100%);
        color: #fff;
        box-shadow: 0 9px 18px -5px rgba(54, 180, 239, 0.65);
      }
      .snap-btn:active { transform: scale(0.97); }
      .snap-btn:disabled {
        background: #B9C7CE;
        color: rgba(255, 255, 255, 0.85);
        box-shadow: none;
        cursor: not-allowed;
      }

      /* Hard offset shadow used for the ghost mark */
      .drop-hard { filter: drop-shadow(3px 5px 0 rgba(0, 0, 0, 0.18)); }
    </style>
